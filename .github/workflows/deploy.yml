# 當程式碼推送到 main 或 master 時，自動打包並部署到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# 設定此 workflow 的權限（部署時需寫入 gh-pages 分支）
permissions:
  contents: write   # 改為 write，peaceiris 才能 push 到 gh-pages
  pages: write
  id-token: write

# 避免多個 job 同時執行
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 取出專案程式碼
      - name: 檢查程式碼
        uses: actions/checkout@v4

      # 設定 Node.js 環境（使用 LTS 版本）
      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 安裝依賴
      - name: 安裝依賴
        run: npm ci

      # 打包專案（輸出到 dist）
      - name: 打包專案
        run: npm run build

      # 使用 peaceiris/actions-gh-pages 將 dist 部署到 gh-pages 分支
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
